<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>RatMed Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-3hWJpQhKfGfHqKpQ2jv8lGqv1S7rH3V1gPj0vQ5oQe2hYcRkS0TqTgNw9mWQH8xY6oIYl3pR5S9QzjFJqC+ALw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body class="bg-[#0d0f12] text-white min-h-screen">
    <main class="max-w-6xl mx-auto p-4">
      <section id="home">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
          <a id="goMeds" class="rounded-xl p-4 text-center shadow hover:shadow-lg transition cursor-pointer glass">
            <span class="tile-emoji">💉</span>
            <div class="font-semibold">Leki</div>
            <div class="text-sm text-white/70 mt-1">Dostępne leki w ZRM P</div>
          </a>
          <a id="goProtocols" class="rounded-xl p-4 text-center shadow hover:shadow-lg transition cursor-pointer glass">
            <span class="tile-emoji">📜</span>
            <div class="font-semibold">Schematy</div>
            <div class="text-sm text-white/70 mt-1">Schematy postępowań z pacjentem</div>
          </a>
          <a id="goSymptoms" class="rounded-xl p-4 text-center shadow hover:shadow-lg transition cursor-pointer glass">
            <span class="tile-emoji">❗</span>
            <div class="font-semibold">Objawy</div>
            <div class="text-sm text-white/70 mt-1">Objawy do zbadania oraz co może prezentować pacjent</div>
          </a>
          <a id="goCalculators" class="rounded-xl p-4 text-center shadow hover:shadow-lg transition cursor-pointer glass">
            <span class="tile-emoji">🧮</span>
            <div class="font-semibold">Kalkulatory</div>
            <div class="text-sm text-white/70 mt-1">Obliczenia medyczne</div>
          </a>
        </div>
      </section>

      <section id="meds" class="hidden">
        <button id="backFromMeds" class="fixed top-3 left-3 z-20 w-10 h-10 flex items-center justify-center rounded-full text-xl transition back-btn">←</button>
        <div class="max-w-5xl mx-auto">
          <input id="medSearch" placeholder="Szukaj leku..." class="w-full bg-[#111317] border border-[#2a2e35] rounded-md px-3 py-2 text-sm mb-4" />
          <div id="medsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
      </section>

      <section id="medDetail" class="hidden">
        <button id="backMedDetail" class="fixed top-3 left-3 z-20 w-10 h-10 flex items-center justify-center rounded-full text-xl transition back-btn">←</button>
        <div class="max-w-3xl mx-auto">
          <div id="medDetailTitle" class="text-xl font-semibold mb-3"></div>
          <div id="medDetailContent" class="rounded-xl border border-[#2a2e35] bg-[#14171b] p-4"></div>
        </div>
      </section>

      <section id="protocols" class="hidden">
        <button id="backFromProtocols" class="fixed top-3 left-3 z-20 w-10 h-10 flex items-center justify-center rounded-full text-xl transition back-btn">←</button>
        <div class="max-w-5xl mx-auto">
          <div id="protocolsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
      </section>

      <section id="protocolDetail" class="hidden">
        <button id="backProtocolDetail" class="fixed top-3 left-3 z-20 w-10 h-10 flex items-center justify-center rounded-full text-xl transition back-btn">←</button>
        <div class="max-w-3xl mx-auto">
          <div id="protocolDetailTitle" class="text-xl font-semibold mb-3"></div>
          <div id="protocolDetailContent" class="rounded-xl border border-[#2a2e35] bg-[#14171b] p-4"></div>
        </div>
      </section>
      
      <section id="calculators" class="hidden">
        <button id="backFromCalculators" class="fixed top-3 left-3 z-20 w-10 h-10 flex items-center justify-center rounded-full text-xl transition back-btn">←</button>
        <div class="max-w-5xl mx-auto">
          <div id="calculatorsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
      </section>

      <section id="calcGCS" class="hidden">
        <button id="backCalcGCS" class="fixed top-3 left-3 z-20 w-10 h-10 flex items-center justify-center rounded-full text-xl transition back-btn">←</button>
        <div class="max-w-3xl mx-auto">
          <div class="text-xl font-semibold mb-3">Glasgow Coma Scale (GCS)</div>
          <div id="gcsBox" class="rounded-xl border border-[#2a2e35] bg-[#14171b] p-4"></div>
        </div>
      </section>

      <section id="calcPeds" class="hidden">
        <button id="backCalcPeds" class="fixed top-3 left-3 z-20 w-10 h-10 flex items-center justify-center rounded-full text-xl transition back-btn">←</button>
        <div class="max-w-3xl mx-auto">
          <div class="text-xl font-semibold mb-3">Leki dla dzieci</div>
          <div id="pedsBox" class="rounded-xl border border-[#2a2e35] bg-[#14171b] p-4"></div>
        </div>
      </section>

      <section id="calcMAP" class="hidden">
        <button id="backCalcMAP" class="fixed top-3 left-3 z-20 w-10 h-10 flex items-center justify-center rounded-full text-xl transition back-btn">←</button>
        <div class="max-w-3xl mx-auto">
          <div class="text-xl font-semibold mb-3">Średnie ciśnienie tętnicze (MAP)</div>
          <div id="mapBox" class="rounded-xl border border-[#2a2e35] bg-[#14171b] p-4"></div>
        </div>
      </section>
    </main>

    <script src="./src/data.js"></script>
    <script src="./src/main.js"></script>
  </body>
</html>
